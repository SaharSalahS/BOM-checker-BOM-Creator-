  const urls = {};
  function loadFrame(id){
    const frame=document.getElementById(id);
    if(frame.dataset.loaded) return;
    const bytes=Uint8Array.from(atob(sources[id]), c=>c.charCodeAt(0));
    const blob=new Blob([bytes],{type:'text/html;charset=utf-8'});
    urls[id]=URL.createObjectURL(blob);
    frame.src=urls[id];
    frame.dataset.loaded='1';
  }
  loadFrame('checkerFrame');
  document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));
    document.querySelectorAll('iframe').forEach(f=>f.classList.toggle('active',f.id===btn.dataset.target));
    loadFrame(btn.dataset.target);
  }));
  window.addEventListener('beforeunload',()=>Object.values(urls).forEach(u=>URL.revokeObjectURL(u)));
})();
</script>
